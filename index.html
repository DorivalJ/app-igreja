<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico - Igreja Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        [color-scheme:dark] { color-scheme: dark; }
    </style>
</head>
<body class="text-slate-200 p-4">

    <div class="max-w-6xl mx-auto space-y-6">
        <!-- FORMULÁRIO -->
        <section class="bg-slate-900 rounded-2xl border border-slate-800 p-6 shadow-xl">
            <h2 id="tituloForm" class="text-xl font-bold mb-6 text-indigo-400">Novo Cadastro</h2>
            <form id="formMembro" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="nome" placeholder="Nome" required class="bg-slate-800 p-2.5 rounded-lg border border-slate-700">
                <input type="date" id="data_nascimento" class="bg-slate-800 p-2.5 rounded-lg border border-slate-700 [color-scheme:dark]">
                <input type="text" id="input_celular" placeholder="Celular" class="bg-slate-800 p-2.5 rounded-lg border border-slate-700">
                <input type="email" id="email" placeholder="E-mail" class="bg-slate-800 p-2.5 rounded-lg border border-slate-700">
                <input type="text" id="cargo" placeholder="Cargo" class="bg-slate-800 p-2.5 rounded-lg border border-slate-700">
                <input type="date" id="data_adesao" class="bg-slate-800 p-2.5 rounded-lg border border-slate-700 [color-scheme:dark]">
                <select id="status" class="bg-slate-800 p-2.5 rounded-lg border border-slate-700">
                    <option value="Ativo">Ativo</option>
                    <option value="Inativo">Inativo</option>
                </select>
                <textarea id="observacao" placeholder="Observações" class="bg-slate-800 p-2.5 rounded-lg border border-slate-700 md:col-span-2"></textarea>
                
                <div class="md:col-span-3 flex justify-end gap-2">
                    <button type="button" id="btnCancelar" onclick="resetarEstado()" class="hidden bg-slate-700 px-6 py-2 rounded-lg">Cancelar</button>
                    <button type="submit" id="btnSalvar" class="bg-indigo-600 px-8 py-2 rounded-lg font-bold">Salvar Membro</button>
                </div>
            </form>
        </section>

        <!-- INDICADORES -->
        <div class="grid grid-cols-3 gap-4 text-center">
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800"><p class="text-xs text-slate-500">Ativos</p><h3 id="dashAtivos" class="text-2xl font-bold">0</h3></div>
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800"><p class="text-xs text-slate-500">Inativos</p><h3 id="dashInativos" class="text-2xl font-bold">0</h3></div>
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800"><p class="text-xs text-slate-500">Total</p><h3 id="dashTotal" class="text-2xl font-bold text-emerald-500">0</h3></div>
        </div>

        <!-- TABELA -->
        <section class="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden shadow-xl">
            <div class="p-4 border-b border-slate-800 flex justify-between items-center">
                <h2 class="font-bold">Membros Cadastrados</h2>
                <input type="text" id="busca" oninput="carregarMembros()" placeholder="Buscar..." class="bg-slate-950 border border-slate-700 rounded-lg px-4 py-1 text-sm">
            </div>
            <table class="w-full text-left">
                <thead class="bg-slate-950 text-slate-500 text-xs uppercase">
                    <tr>
                        <th class="p-4">Nome</th>
                        <th class="p-4">Cargo</th>
                        <th class="p-4">Contato</th>
                        <th class="p-4">Status</th>
                        <th class="p-4 text-right">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaMembros" class="divide-y divide-slate-800"></tbody>
            </table>
        </section>
    </div>

    <script>
        // VERIFIQUE ESSAS CHAVES NO SEU PAINEL DO SUPABASE!
        const SUPABASE_URL = 'https://nysikpghdbzvtzrnbasi.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_wyj6ORO3Ko1DB3nbTdTqhQ_2uGEVA4W'; // <--- ESSA CHAVE PARECE ERRADA!

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let editandoID = null;

        async function carregarMembros() {
            try {
                const termo = document.getElementById('busca').value;
                let query = _supabase.from('membros').select('*').order('nome', { ascending: true });
                
                if (termo) query = query.ilike('nome', `%${termo}%`);

                const { data, error } = await query;

                if (error) {
                    alert("Erro do Supabase ao carregar: " + error.message);
                    return;
                }

                const tbody = document.getElementById('tabelaMembros');
                tbody.innerHTML = '';

                let ativos = 0, inativos = 0;

                data.forEach(m => {
                    if (m.status === 'Ativo') ativos++; else inativos++;

                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-800/50">
                            <td class="p-4 font-medium">${m.nome}</td>
                            <td class="p-4 text-slate-400 text-sm">${m.cargo || '-'}</td>
                            <td class="p-4 text-slate-400 text-sm">${m.celular || '-'}</td>
                            <td class="p-4">
                                <span class="px-2 py-0.5 rounded text-[10px] font-bold ${m.status === 'Ativo' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-slate-800 text-slate-500'}">
                                    ${m.status.toUpperCase()}
                                </span>
                            </td>
                            <td class="p-4 text-right">
                                <button onclick="editarMembro(${m.id})" class="text-indigo-400 mr-2"><i data-lucide="pencil" class="w-4 h-4"></i></button>
                                <button onclick="deletarMembro(${m.id})" class="text-rose-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </td>
                        </tr>
                    `;
                });

                document.getElementById('dashAtivos').textContent = ativos;
                document.getElementById('dashInativos').textContent = inativos;
                document.getElementById('dashTotal').textContent = data.length;
                lucide.createIcons();

            } catch (err) {
                alert("Erro crítico de JS: " + err.message);
            }
        }

        document.getElementById('formMembro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            btn.disabled = true;

            const membro = {
                nome: document.getElementById('nome').value,
                data_nascimento: document.getElementById('data_nascimento').value || null,
                celular: document.getElementById('input_celular').value || null,
                email: document.getElementById('email').value || null,
                cargo: document.getElementById('cargo').value || null,
                data_adesao: document.getElementById('data_adesao').value || null,
                status: document.getElementById('status').value,
                observacao: document.getElementById('observacao').value || null
            };

            let erro;
            if (editandoID) {
                const { error } = await _supabase.from('membros').update(membro).eq('id', editandoID);
                erro = error;
            } else {
                const { error } = await _supabase.from('membros').insert([membro]);
                erro = error;
            }

            if (erro) {
                alert("Erro ao salvar: " + erro.message);
            } else {
                alert("Sucesso!");
                resetarEstado();
                carregarMembros();
            }
            btn.disabled = false;
        });

        async function editarMembro(id) {
            const { data, error } = await _supabase.from('membros').select('*').eq('id', id).single();
            if (error) return alert("Erro ao buscar membro");

            editandoID = id;
            document.getElementById('nome').value = data.nome;
            document.getElementById('data_nascimento').value = data.data_nascimento;
            document.getElementById('input_celular').value = data.celular;
            document.getElementById('email').value = data.email;
            document.getElementById('cargo').value = data.cargo;
            document.getElementById('data_adesao').value = data.data_adesao;
            document.getElementById('status').value = data.status;
            document.getElementById('observacao').value = data.observacao;

            document.getElementById('tituloForm').innerText = "Editando Membro";
            document.getElementById('btnSalvar').innerText = "Atualizar";
            document.getElementById('btnCancelar').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function resetarEstado() {
            editandoID = null;
            document.getElementById('formMembro').reset();
            document.getElementById('tituloForm').innerText = "Novo Cadastro";
            document.getElementById('btnSalvar').innerText = "Salvar Membro";
            document.getElementById('btnCancelar').classList.add('hidden');
        }

        async function deletarMembro(id) {
            if (confirm("Excluir?")) {
                const { error } = await _supabase.from('membros').delete().eq('id', id);
                if (error) alert("Erro ao excluir"); else carregarMembros();
            }
        }

        window.onload = carregarMembros;
    </script>
</body>
</html>
