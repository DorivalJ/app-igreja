<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Membros - Igreja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div class="min-h-screen flex flex-col">
        <!-- HEADER -->
        <header class="bg-white border-b border-slate-200 px-6 py-4">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="bg-indigo-600 p-2 rounded-lg text-white">
                        <i data-lucide="users"></i>
                    </div>
                    <h1 class="text-xl font-bold tracking-tight text-slate-900">Gestão de Membros</h1>
                </div>
                <div class="text-sm text-slate-500">
                    Igreja Digital v1.0
                </div>
            </div>
        </header>

        <main class="flex-1 max-w-6xl w-full mx-auto p-4 md:p-6 space-y-6">
            
            <!-- FORMULÁRIO DE CADASTRO -->
            <section class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-4 border-b border-slate-100 bg-slate-50/50">
                    <h2 class="font-semibold text-slate-700 flex items-center gap-2">
                        <i data-lucide="user-plus" class="w-4 h-4 text-indigo-600"></i>
                        Novo Cadastro
                    </h2>
                </div>
                <form class="p-6">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <!-- Nome -->
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-slate-700 mb-1">Nome Completo</label>
                            <input type="text" placeholder="Ex: João Silva" class="w-full px-3 py-2 bg-white border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all">
                        </div>

                        <!-- Data Nascimento -->
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Data de Nascimento</label>
                            <input type="date" class="w-full px-3 py-2 bg-white border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all">
                        </div>

                        <!-- Telefone -->
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Telefone / WhatsApp</label>
                            <input type="text" placeholder="(00) 00000-0000" class="w-full px-3 py-2 bg-white border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all">
                        </div>

                        <!-- Data Adesão -->
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Data de Adesão</label>
                            <input type="date" class="w-full px-3 py-2 bg-white border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all">
                        </div>

                        <!-- Status -->
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Status</label>
                            <select class="w-full px-3 py-2 bg-white border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all">
                                <option value="Ativo">Ativo</option>
                                <option value="Inativo">Inativo</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-6 flex justify-end">
                        <button type="submit" class="inline-flex items-center gap-2 px-6 py-2.5 bg-indigo-600 text-white font-semibold rounded-md hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-200 transition-all shadow-lg shadow-indigo-100">
                            <i data-lucide="save" class="w-4 h-4"></i>
                            Cadastrar Membro
                        </button>
                    </div>
                </form>
            </section>

            <!-- LISTAGEM E BUSCA -->
            <section class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <!-- Barra de Busca -->
                <div class="p-4 border-b border-slate-100 bg-slate-50/50 flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <h2 class="font-semibold text-slate-700 flex items-center gap-2">
                        <i data-lucide="list" class="w-4 h-4 text-indigo-600"></i>
                        Membros Cadastrados
                    </h2>
                    
                    <div class="relative max-w-sm w-full">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <i data-lucide="search" class="w-4 h-4"></i>
                        </span>
                        <input type="text" placeholder="Buscar por nome..." class="w-full pl-10 pr-4 py-2 bg-white border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    </div>
                </div>

                <!-- Tabela -->
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 text-slate-500 uppercase text-xs font-bold tracking-wider">
                                <th class="px-6 py-4">Membro</th>
                                <th class="px-6 py-4">Contato</th>
                                <th class="px-6 py-4">Adesão</th>
                                <th class="px-6 py-4">Status</th>
                                <th class="px-6 py-4 text-right">Ações</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100 text-sm">
                            <!-- Exemplo de Linha 1 -->
                            <tr class="hover:bg-slate-50/80 transition-colors">
                                <td class="px-6 py-4">
                                    <div class="font-semibold text-slate-900">Ricardo Almeida</div>
                                    <div class="text-xs text-slate-500 italic">Nasc: 12/05/1985</div>
                                </td>
                                <td class="px-6 py-4 text-slate-600">(11) 98888-7777</td>
                                <td class="px-6 py-4 text-slate-600">10/01/2022</td>
                                <td class="px-6 py-4">
                                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700">
                                        Ativo
                                    </span>
                                </td>
                                <td class="px-6 py-4 text-right">
                                    <button class="text-slate-400 hover:text-indigo-600 transition-colors mx-1" title="Editar">
                                        <i data-lucide="edit-3" class="w-4 h-4"></i>
                                    </button>
                                    <button class="text-slate-400 hover:text-red-600 transition-colors mx-1" title="Excluir">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </td>
                            </tr>
                            
                            <!-- Exemplo de Linha 2 -->
                            <tr class="hover:bg-slate-50/80 transition-colors">
                                <td class="px-6 py-4">
                                    <div class="font-semibold text-slate-900">Maria Oliveira</div>
                                    <div class="text-xs text-slate-500 italic">Nasc: 22/08/1990</div>
                                </td>
                                <td class="px-6 py-4 text-slate-600">(11) 97777-6666</td>
                                <td class="px-6 py-4 text-slate-600">15/03/2023</td>
                                <td class="px-6 py-4">
                                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-600">
                                        Inativo
                                    </span>
                                </td>
                                <td class="px-6 py-4 text-right">
                                    <button class="text-slate-400 hover:text-indigo-600 transition-colors mx-1" title="Editar">
                                        <i data-lucide="edit-3" class="w-4 h-4"></i>
                                    </button>
                                    <button class="text-slate-400 hover:text-red-600 transition-colors mx-1" title="Excluir">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Paginação ou Rodapé da Tabela -->
                <div class="p-4 bg-slate-50/50 border-t border-slate-100 text-center text-xs text-slate-500">
                    Mostrando 2 membros cadastrados
                </div>
            </section>
        </main>
    </div>

    <!-- Inicializar Ícones -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
