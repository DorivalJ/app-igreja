<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Membros - Dark Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; /* slate-950 */
        }
        /* Custom scrollbar para combinar com o tema dark */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="text-slate-200">

    <div class="min-h-screen flex flex-col">
        <!-- HEADER -->
        <header class="bg-slate-900/50 border-b border-slate-800 px-6 py-4 backdrop-blur-sm sticky top-0 z-10">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-600 p-2 rounded-lg text-white shadow-lg shadow-indigo-500/20">
                        <i data-lucide="users"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight text-white">Gestão de Membros</h1>
                        <p class="text-xs text-slate-500 font-medium uppercase tracking-wider">Painel Administrativo</p>
                    </div>
                </div>
                <div class="hidden md:block">
                    <span class="text-sm bg-slate-800 text-slate-400 px-3 py-1 rounded-full border border-slate-700">
                        Igreja Digital v1.0
                    </span>
                </div>
            </div>
        </header>

        <main class="flex-1 max-w-6xl w-full mx-auto p-4 md:p-6 space-y-8">
            
            <!-- FORMULÁRIO DE CADASTRO -->
            <section class="bg-slate-900 rounded-2xl shadow-2xl border border-slate-800 overflow-hidden">
                <div class="p-5 border-b border-slate-800 bg-slate-900/50 flex items-center gap-2">
                    <i data-lucide="user-plus" class="w-5 h-5 text-indigo-400"></i>
                    <h2 class="font-semibold text-slate-100">Novo Cadastro</h2>
                </div>
                
                <form class="p-6 md:p-8">
                    <div class="grid grid-cols-1 md:grid-cols-6 gap-6">
                        <!-- Nome -->
                        <div class="md:col-span-3">
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Nome Completo</label>
                            <input type="text" placeholder="Ex: João Silva" 
                                class="w-full px-4 py-2.5 bg-slate-800 border border-slate-700 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all">
                        </div>

                        <!-- Data Nascimento -->
                        <div class="md:col-span-1.5">
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Nascimento</label>
                            <input type="date" 
                                class="w-full px-4 py-2.5 bg-slate-800 border border-slate-700 rounded-xl text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all [color-scheme:dark]">
                        </div>

                        <!-- Telefone -->
                        <div class="md:col-span-1.5">
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Telefone</label>
                            <input type="text" placeholder="(00) 00000-0000" 
                                class="w-full px-4 py-2.5 bg-slate-800 border border-slate-700 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                        </div>

                        <!-- Data Adesão -->
                        <div class="md:col-span-2">
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Data de Adesão</label>
                            <input type="date" 
                                class="w-full px-4 py-2.5 bg-slate-800 border border-slate-700 rounded-xl text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all [color-scheme:dark]">
                        </div>

                        <!-- Status
